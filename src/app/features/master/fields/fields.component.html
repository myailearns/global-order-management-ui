<div class="fields-container">
  @if (errorMessage()) {
    <div class="error-banner">
      <div class="error-banner__content">
        <i class="ri-alert-circle-fill" aria-hidden="true"></i>
        <p>{{ errorMessage() }}</p>
      </div>
      <button class="error-banner__close" (click)="errorMessage.set(null)" [attr.aria-label]="text.closeErrorBanner | translate">
        <i class="ri-close-line" aria-hidden="true"></i>
      </button>
    </div>
  }

  <gom-fields-list
    [fields]="fields()"
    [fieldGroupUsageByFieldId]="fieldGroupUsageByFieldId()"
    [loading]="loading()"
    [canCreate]="canCreateField()"
    [canEdit]="canEditField()"
    [canDelete]="canDeleteField()"
    (addNew)="onAddNew()"
    (action)="onAction($event)"
  ></gom-fields-list>

  <gom-fields-form
    [isOpen]="formOpen()"
    [initialData]="getSelectedFieldFormData()"
    [fieldGroupOptions]="fieldGroupAssignOptions()"
    [initialAssignedFieldGroupIds]="getSelectedFieldAssignedFieldGroupIds()"
    (formSubmit)="onFormSubmit($event)"
    (formCancel)="onFormCancel()"
  ></gom-fields-form>

  <gom-fields-view
    [isOpen]="viewOpen()"
    [field]="viewingField()"
    [usedInFieldGroups]="getViewingFieldGroupUsage()"
    [busy]="loading()"
    [canEdit]="canEditField()"
    [canDelete]="canDeleteField()"
    (viewClosed)="onViewClose()"
    (edit)="onViewEdit($event)"
    (delete)="onViewDelete($event)"
  ></gom-fields-view>

  <gom-lib-confirmation-modal
    [(show)]="deleteConfirmOpen"
    [title]="text.deleteTitle | translate"
    [message]="getDeleteMessage()"
    [confirmText]="text.confirmDelete | translate"
    [confirmIconOnly]="true"
    confirmIcon="ri-delete-bin-line"
    [cancelText]="text.close | translate"
    confirmVariant="danger"
    [busy]="loading()"
    (confirmed)="onDeleteConfirmed()"
    (cancelled)="onDeleteCancelled()"
  ></gom-lib-confirmation-modal>
</div>
