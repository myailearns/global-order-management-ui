<section class="master-page">
  <header class="master-page__header">
    <h2>Fields</h2>
    <gom-button type="button" variant="primary" (buttonClick)="onAddField()">Add Field</gom-button>
  </header>

  <article class="master-page__table-shell">
    <gom-table
      [columns]="columns"
      [rows]="rows"
      [pageSize]="10"
      [pageSizeOptions]="[10, 20, 50]"
      searchPlaceholder="Search fields"
      emptyMessage="No fields found."
      [mobileCardView]="true"
    ></gom-table>
  </article>
</section>
