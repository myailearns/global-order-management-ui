<div class="fields-list">
  <header class="fields-list__header">
    <h2><i class="ri-table-2" aria-hidden="true"></i> {{ text.pageTitle | translate }}</h2>
      <gom-lib-button
        class="btn-add"
        (buttonClick)="onAddNew()"
        gomDisableIfNoFeature="field.create"
        [disabled]="loading || !canCreate"
      >
        <i class="ri-add-line" aria-hidden="true"></i> {{ text.addField | translate }}
      </gom-lib-button>
  </header>

  <section class="fields-list__table-shell">
    <gom-lib-table
      [columns]="columns"
      [rows]="rows"
      [loading]="loading"
      [dataMode]="dataMode"
      [totalItems]="totalItems"
      [pageIndex]="pageIndex"
      [pageSize]="pageSize"
      [pageSizeOptions]="pageSizeOptions"
      [searchPlaceholder]="text.searchPlaceholder | translate"
      [emptyMessage]="text.emptyMessage | translate"
      [mobileCardView]="true"
      [mobileCardFields]="mobileCardFields"
      [mobileCardClickable]="true"
      (rowAction)="onRowAction($event)"
      (rowClick)="onRowClick($event)"
      (queryChange)="onTableQueryChange($event)"
    ></gom-lib-table>
  </section>
</div>
