<section class="master-page">
  <header class="master-page__header">
    <h2><i class="ri-scales-3-line" aria-hidden="true"></i> Units</h2>
    <gom-button type="button" variant="primary" (buttonClick)="onAddUnit()"><i class="ri-add-line" aria-hidden="true"></i> Add Unit</gom-button>
  </header>

  <article class="master-page__table-shell">
    <gom-table
      [columns]="columns"
      [rows]="rows"
      [pageSize]="10"
      [pageSizeOptions]="[10, 20, 50]"
      searchPlaceholder="Search units"
      emptyMessage="No units found."
      [mobileCardView]="true"
    ></gom-table>
  </article>
</section>
