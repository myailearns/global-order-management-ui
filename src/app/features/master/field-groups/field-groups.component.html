<section class="master-page">
  <header class="master-page__header">
    <h2><i class="ri-bookmark-line" aria-hidden="true"></i> {{ 'fieldGroups.title' | translate }}</h2>
    @if (canCreateFieldGroup()) {
    <gom-lib-button type="button" variant="primary" (buttonClick)="onAddFieldGroup()">
      <i class="ri-add-line" aria-hidden="true"></i> {{ 'fieldGroups.add' | translate }}
    </gom-lib-button>
    }
  </header>

  @if (errorMessage()) {
    <div class="master-page__error">
      <div class="master-page__error-content">
        <i class="ri-alert-fill" aria-hidden="true"></i>
        <span>{{ errorMessage() }}</span>
      </div>
    </div>
  }

  <article class="master-page__table-shell">
    <gom-lib-table
      [columns]="columns"
      [rows]="rows()"
      [loading]="loading()"
      [pageSize]="10"
      [pageSizeOptions]="[10, 20, 50]"
      [searchPlaceholder]="'fieldGroups.search' | translate"
      [emptyMessage]="'fieldGroups.empty' | translate"
      [mobileCardView]="true"
      (rowAction)="onRowAction($event)"
    ></gom-lib-table>
  </article>
</section>

<gom-field-groups-form
  [isOpen]="formOpen()"
  [initialData]="selectedFieldGroup()"
  [fields]="fields()"
  [categories]="categories()"
  [groups]="groups()"
  (formSubmit)="onFormSubmit($event)"
  (formCancel)="onFormCancel()"
></gom-field-groups-form>

<gom-lib-confirmation-modal
  [(show)]="deleteConfirmOpen"
  [title]="('fieldGroups.deleteConfirm.title' | translate)"
  [message]="getDeleteMessage()"
  [confirmText]="('common.actions.delete' | translate)"
  [cancelText]="('common.actions.cancel' | translate)"
  confirmVariant="danger"
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()"
></gom-lib-confirmation-modal>
