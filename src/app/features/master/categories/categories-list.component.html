<div class="categories-list">
  <header class="categories-list__header">
    <h2><i class="ri-tags-line" aria-hidden="true"></i> Categories</h2>
    <gom-button class="btn-add" (buttonClick)="onAddNew()" [disabled]="loading">
      <i class="ri-add-line" aria-hidden="true"></i> Add Category
    </gom-button>
  </header>

  <section class="categories-list__table-shell">
    <gom-table
      [columns]="columns"
      [rows]="rows"
      [loading]="loading"
      [pageSize]="10"
      [pageSizeOptions]="[10, 20, 50]"
      searchPlaceholder="Search categories"
      emptyMessage="No categories found."
      [mobileCardView]="true"
      (rowAction)="onRowAction($event)"
    ></gom-table>
  </section>
</div>
