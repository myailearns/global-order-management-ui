<div class="modal-overlay" *ngIf="isOpen" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2><i class="ri-edit-box-line" aria-hidden="true"></i> {{ initialData ? 'Edit Category' : 'Add Category' }}</h2>
      <button class="close-btn" (click)="onCancel()" type="button" aria-label="Close">
        <i class="ri-close-line" aria-hidden="true"></i>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="modal-body">
      <div class="form-group">
        <label for="name">Category Name *</label>
        <gom-input
          id="name"
          formControlName="name"
          placeholder="Enter category name"
          [error]="form.get('name')?.invalid && form.get('name')?.touched ? (form.get('name')?.errors?.['required'] ? 'Category name is required' : 'Minimum 2 characters required') : ''"
        ></gom-input>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="onCancel()">
          <i class="ri-close-line" aria-hidden="true"></i> Cancel
        </button>
        <button type="submit" class="btn-primary" [disabled]="form.invalid">
          <i class="ri-check-line" aria-hidden="true"></i> {{ initialData ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </div>
</div>
