<section class="master-page">
  <header class="master-page__header">
    <h2><i class="ri-percent-line" aria-hidden="true"></i> Tax Profiles</h2>
    @if (canCreateTaxProfile()) {
    <gom-lib-button type="button" variant="primary" (buttonClick)="openCreate()">
      <i class="ri-add-line" aria-hidden="true"></i> Add Tax Profile
    </gom-lib-button>
    }
  </header>

  @if (errorMessage()) {
    <div class="master-page__error">
      <div style="display: flex; gap: 0.75rem; align-items: center;">
        <i class="ri-alert-fill" style="font-size: 1.25rem; flex-shrink: 0;" aria-hidden="true"></i>
        <span>{{ errorMessage() }}</span>
      </div>
    </div>
  }

  <article class="master-page__table-shell">
    <gom-lib-table
      [columns]="columns"
      [rows]="rows()"
      [loading]="loading()"
      [pageSize]="10"
      [pageSizeOptions]="[10, 20, 50]"
      searchPlaceholder="Search tax profiles"
      emptyMessage="No tax profiles found."
      [mobileCardView]="true"
      (rowAction)="onRowAction($event)"
    ></gom-lib-table>
  </article>
</section>

<gom-tax-profiles-form
  [isOpen]="formOpen()"
  [initialData]="editingFormData()"
  (formSubmit)="onFormSubmit($event)"
  (formCancel)="onFormCancel()"
></gom-tax-profiles-form>
