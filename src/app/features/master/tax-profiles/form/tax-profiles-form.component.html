<gom-lib-modal
  [title]="isEditing ? 'Edit Tax Profile' : 'Create Tax Profile'"
  [show]="isOpen"
  (showChange)="isOpen = $event"
  (closed)="onCancel()"
  size="medium"
>
  <section class="form-grid" [formGroup]="taxProfileForm">
    <gom-lib-input
      label="Tax Profile Name"
      type="text"
      placeholder="Enter tax profile name"
      [formControl]="taxProfileForm.controls.name"
      [error]="taxProfileForm.controls.name.touched && taxProfileForm.controls.name.invalid ? 'Tax profile name is required' : ''"
    ></gom-lib-input>

    <gom-lib-input
      label="Country Code"
      type="text"
      placeholder="IN"
      [formControl]="taxProfileForm.controls.countryCode"
    ></gom-lib-input>

    <gom-lib-select
      label="Tax Mode"
      placeholder="Select tax mode"
      [options]="[{ value: 'GST', label: 'GST' }, { value: 'NO_TAX', label: 'NO_TAX' }]"
      [formControl]="taxProfileForm.controls.taxMode"
    ></gom-lib-select>

    <gom-lib-input
      label="Rate (%)"
      type="number"
      placeholder="Enter tax rate"
      [formControl]="taxProfileForm.controls.rate"
    ></gom-lib-input>

    <gom-lib-select
      label="Inclusive"
      placeholder="Select inclusive type"
      [options]="[{ value: 'YES', label: 'YES' }, { value: 'NO', label: 'NO' }]"
      [formControl]="taxProfileForm.controls.inclusive"
    ></gom-lib-select>

    <gom-lib-input
      label="HSN Code"
      type="text"
      placeholder="Enter HSN code"
      [formControl]="taxProfileForm.controls.hsnCode"
    ></gom-lib-input>

    <gom-lib-input
      label="Effective From"
      type="text"
      placeholder="YYYY-MM-DD"
      [formControl]="taxProfileForm.controls.effectiveFrom"
    ></gom-lib-input>

    <gom-lib-select
      label="Status"
      placeholder="Select status"
      [options]="[{ value: 'ACTIVE', label: 'ACTIVE' }, { value: 'INACTIVE', label: 'INACTIVE' }]"
      [formControl]="taxProfileForm.controls.status"
    ></gom-lib-select>
  </section>

  <footer class="gom-modal__action-layout tax-form__actions" gom-modal-actions>
    <div class="gom-modal__action-layout-start"></div>
    <div class="gom-modal__action-layout-end">
      <gom-lib-button
        class="tax-form__action"
        type="button"
        variant="secondary"
        [size]="cancelMode === 'icon-only' ? 'icon' : 'default'"
        aria-label="Close"
        title="Close"
        (buttonClick)="onCancel()"
      >
        @if (shouldShowIcon(cancelMode)) {
          <i class="ri-close-line" aria-hidden="true"></i>
        }
        @if (shouldShowText(cancelMode)) {
          Cancel
        }
      </gom-lib-button>
      <gom-lib-button
        class="tax-form__action"
        type="button"
        variant="primary"
        [size]="submitMode === 'icon-only' ? 'icon' : 'default'"
        [attr.aria-label]="isEditing ? 'Update Tax Profile' : 'Create Tax Profile'"
        [attr.title]="isEditing ? 'Update Tax Profile' : 'Create Tax Profile'"
        (buttonClick)="onSubmit()"
        [disabled]="taxProfileForm.invalid"
      >
        @if (shouldShowIcon(submitMode)) {
          <i class="ri-check-line" aria-hidden="true"></i>
        }
        @if (shouldShowText(submitMode)) {
          {{ isEditing ? 'Update Tax Profile' : 'Create Tax Profile' }}
        }
      </gom-lib-button>
    </div>
  </footer>
</gom-lib-modal>
