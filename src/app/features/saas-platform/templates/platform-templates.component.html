<div class="platform-templates">
  <div class="page-header">
    <h2>Platform Templates</h2>
    <p class="page-description">Manage template categories, fields, units, and tax profiles that tenants can subscribe to.</p>
  </div>

  <!-- Tabs -->
  <gom-lib-tabs [tabs]="tabs" [activeTab]="activeTab()" (tabChange)="switchTab($event)">

    <!-- Categories Tab -->
    <gom-lib-tab-content tabId="categories" [activeTab]="activeTab()">
      <div class="tab-content">
        <div class="tab-header">
          <h3>Template Categories</h3>
          <gom-lib-button (buttonClick)="openCategoryForm()">
            <i class="ri-add-line" aria-hidden="true"></i> Add Category
          </gom-lib-button>
        </div>
        <gom-lib-table
          [columns]="categoryColumns"
          [rows]="categoryRows"
          [loading]="loading()"
          [pageSize]="10"
          [pageSizeOptions]="[10, 20, 50]"
          searchPlaceholder="Search categories…"
          emptyMessage="No template categories yet."
          (rowAction)="onCategoryAction($event)"
        ></gom-lib-table>
      </div>
    </gom-lib-tab-content>

    <!-- Fields Tab -->
    <gom-lib-tab-content tabId="fields" [activeTab]="activeTab()">
      <div class="tab-content">
        <div class="tab-header">
          <h3>Template Fields</h3>
          <gom-lib-button (buttonClick)="openFieldForm()">
            <i class="ri-add-line" aria-hidden="true"></i> Add Field
          </gom-lib-button>
        </div>
        <gom-lib-table
          [columns]="fieldColumns"
          [rows]="fieldRows"
          [loading]="loading()"
          [pageSize]="10"
          [pageSizeOptions]="[10, 20, 50]"
          searchPlaceholder="Search fields…"
          emptyMessage="No template fields yet."
          (rowAction)="onFieldAction($event)"
        ></gom-lib-table>
      </div>
    </gom-lib-tab-content>

    <!-- Field Groups Tab -->
    <gom-lib-tab-content tabId="field-groups" [activeTab]="activeTab()">
      <div class="tab-content">
        <div class="tab-header">
          <h3>Template Field Groups</h3>
          <gom-lib-button (buttonClick)="openFieldGroupForm()">
            <i class="ri-add-line" aria-hidden="true"></i> Add Field Group
          </gom-lib-button>
        </div>
        <gom-lib-table
          [columns]="fieldGroupColumns"
          [rows]="fieldGroupRows"
          [loading]="loading()"
          [pageSize]="10"
          [pageSizeOptions]="[10, 20, 50]"
          searchPlaceholder="Search field groups…"
          emptyMessage="No template field groups yet."
          (rowAction)="onFieldGroupAction($event)"
        ></gom-lib-table>
      </div>
    </gom-lib-tab-content>

    <!-- Units Tab -->
    <gom-lib-tab-content tabId="units" [activeTab]="activeTab()">
      <div class="tab-content">
        <div class="tab-header">
          <h3>Template Units</h3>
          <gom-lib-button (buttonClick)="openUnitForm()">
            <i class="ri-add-line" aria-hidden="true"></i> Add Unit
          </gom-lib-button>
        </div>
        <gom-lib-table
          [columns]="unitColumns"
          [rows]="unitRows"
          [loading]="loading()"
          [pageSize]="10"
          [pageSizeOptions]="[10, 20, 50]"
          searchPlaceholder="Search units…"
          emptyMessage="No template units yet."
          (rowAction)="onUnitAction($event)"
        ></gom-lib-table>
      </div>
    </gom-lib-tab-content>

    <!-- Tax Profiles Tab -->
    <gom-lib-tab-content tabId="tax-profiles" [activeTab]="activeTab()">
      <div class="tab-content">
        <div class="tab-header">
          <h3>Template Tax Profiles</h3>
          <gom-lib-button (buttonClick)="openTaxForm()">
            <i class="ri-add-line" aria-hidden="true"></i> Add Tax Profile
          </gom-lib-button>
        </div>
        <gom-lib-table
          [columns]="taxProfileColumns"
          [rows]="taxProfileRows"
          [loading]="loading()"
          [pageSize]="10"
          [pageSizeOptions]="[10, 20, 50]"
          searchPlaceholder="Search tax profiles…"
          emptyMessage="No template tax profiles yet."
          (rowAction)="onTaxProfileAction($event)"
        ></gom-lib-table>
      </div>
    </gom-lib-tab-content>

  </gom-lib-tabs>

  <!-- Shared Category Form -->
  <gom-categories-form
    [isOpen]="categoryFormOpen()"
    [initialData]="editingCategoryData()"
    (formSubmit)="onCategoryFormSubmit($event)"
    (formCancel)="onCategoryFormCancel()"
  ></gom-categories-form>

  <!-- Shared Fields Form -->
  <gom-fields-form
    [isOpen]="fieldFormOpen()"
    [initialData]="editingFieldData()"
    [fieldGroupOptions]="fieldGroupAssignOptions()"
    [initialAssignedFieldGroupIds]="initialAssignedFieldGroupIds()"
    (formSubmit)="onFieldFormSubmit($event)"
    (formCancel)="onFieldFormCancel()"
  ></gom-fields-form>

  <!-- Shared Units Form -->
  <gom-units-form
    [isOpen]="unitFormOpen()"
    [initialData]="editingUnitData()"
    [baseUnitOptions]="unitBaseOptions()"
    [categoryOptions]="categorySelectOptions()"
    (formSubmit)="onUnitFormSubmit($event)"
    (formCancel)="onUnitFormCancel()"
  ></gom-units-form>

  <!-- Shared Tax Profile Form -->
  <gom-tax-profiles-form
    [isOpen]="taxFormOpen()"
    [initialData]="editingTaxFormData()"
    (formSubmit)="onTaxFormSubmit($event)"
    (formCancel)="onTaxFormCancel()"
  ></gom-tax-profiles-form>

  <!-- Shared Field Groups Form -->
  <gom-field-groups-form
    [isOpen]="fieldGroupFormOpen()"
    [initialData]="editingFieldGroupData()"
    [fields]="fieldGroupFields()"
    [categories]="fieldGroupCategories()"
    [groups]="[]"
    (formSubmit)="onFieldGroupFormSubmit($event)"
    (formCancel)="onFieldGroupFormCancel()"
  ></gom-field-groups-form>

  <!-- Delete Confirmation -->
  <gom-lib-confirmation-modal
    [(show)]="deleteConfirmOpen"
    title="Delete Template Item"
    [message]="'Are you sure you want to delete \'' + (pendingDelete()?.name || '') + '\'?'"
    confirmText="Delete"
    [confirmIconOnly]="true"
    confirmIcon="ri-delete-bin-line"
    cancelText="Cancel"
    confirmVariant="danger"
    [busy]="loading()"
    (confirmed)="onDeleteConfirmed()"
    (cancelled)="onDeleteCancelled()"
  ></gom-lib-confirmation-modal>

  <gom-category-associations-modal
    [isOpen]="associationsOpen()"
    [category]="associationsCategory()"
    [apiProvider]="associationsApiProvider"
    (closed)="onAssociationsClosed()"
    (updated)="loadAll()"
  ></gom-category-associations-modal>
</div>
