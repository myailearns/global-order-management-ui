<section class="gom-table-shell">
  <header class="gom-table-toolbar">
    <div class="gom-table-toolbar__search">
      <gom-input
        class="gom-table-search"
        type="search"
        [placeholder]="searchPlaceholder"
        [ngModel]="searchTerm"
        (ngModelChange)="setSearchTerm($event)"
      ></gom-input>
    </div>

    <div class="gom-table-toolbar__actions">
      <gom-button
        class="gom-table-icon-button"
        [variant]="filtersVisible ? 'primary' : 'secondary'"
        size="icon"
        (buttonClick)="toggleFilters()"
        aria-label="Toggle column filters"
        title="Toggle column filters"
      >
        <i class="ri-filter-line" aria-hidden="true"></i>
      </gom-button>

      <gom-button
        class="gom-table-icon-button"
        [variant]="columnPanelOpen ? 'primary' : 'secondary'"
        size="icon"
        (buttonClick)="toggleColumnPanel()"
        aria-label="Show or hide columns"
        title="Show or hide columns"
      >
        <i class="ri-list-settings-line" aria-hidden="true"></i>
      </gom-button>

      <section class="gom-table-panel" *ngIf="columnPanelOpen">
        <header class="gom-table-panel__header">
          <h3>Columns</h3>
          <gom-button class="gom-table-panel__close" variant="secondary" (buttonClick)="closeColumnPanel()">Close</gom-button>
        </header>

        <div class="gom-table-panel__body">
          <label class="checkbox-row" *ngFor="let column of columns; trackBy: trackByColumn">
            <input
              type="checkbox"
              [checked]="visibleColumnKeys.has(column.key)"
              [disabled]="visibleColumnKeys.size === 1 && visibleColumnKeys.has(column.key)"
              (change)="toggleColumn(column.key)"
            />
            <span>{{ column.header }}</span>
          </label>
        </div>
      </section>
    </div>
  </header>

  <div class="gom-table-wrap">
    <table class="gom-table">
      <thead>
        <tr>
          <th
            *ngFor="let column of visibleColumns; trackBy: trackByColumn"
            scope="col"
            [style.width]="column.width"
            [class]="'align-' + getHeaderAlign(column)"
            [class.sortable]="column.sortable"
            [attr.tabindex]="column.sortable ? 0 : null"
            [attr.role]="column.sortable ? 'button' : null"
            (click)="setSort(column)"
            (keydown)="handleHeaderKeydown($event, column)"
          >
            <span>{{ column.header }}</span>
            <span class="sort-indicator" *ngIf="column.sortable && getSortDirection(column.key)" aria-hidden="true">
              <i *ngIf="getSortDirection(column.key) === 'asc'" class="ri-arrow-up-s-line"></i>
              <i *ngIf="getSortDirection(column.key) === 'desc'" class="ri-arrow-down-s-line"></i>
            </span>
          </th>
        </tr>

        <tr *ngIf="hasInlineFilters" class="gom-table-filter-row">
          <th *ngFor="let column of visibleColumns; trackBy: trackByColumn" scope="col">
            <ng-container *ngIf="column.filterable; else emptyFilterCell">
              <gom-input
                class="gom-table-column-filter"
                type="search"
                [placeholder]="'Search ' + column.header"
                [id]="'filter-' + column.key"
                [ngModel]="filters[column.key] || ''"
                (click)="$event.stopPropagation()"
                (keydown)="$event.stopPropagation()"
                (ngModelChange)="setFilter(column.key, $event)"
              ></gom-input>
            </ng-container>
            <ng-template #emptyFilterCell>
              <span class="gom-table-filter-spacer"></span>
            </ng-template>
          </th>
        </tr>
      </thead>

      <tbody>
        <tr *ngIf="loading">
          <td [attr.colspan]="visibleColumns.length" class="state-cell">Loading...</td>
        </tr>

        <tr *ngIf="!loading && displayedRows.length === 0">
          <td [attr.colspan]="visibleColumns.length" class="state-cell">{{ emptyMessage }}</td>
        </tr>

        <tr *ngFor="let row of displayedRows; trackBy: trackByRow">
          <td
            *ngFor="let column of visibleColumns; trackBy: trackByColumn"
            [class]="'align-' + getCellAlign(column) + ' text-' + getTextMode(column)"
            [attr.title]="getCellValue(row, column)"
          >
            <ng-container *ngIf="hasActionButtons(column); else standardCell">
              <div class="gom-table-actions">
                <gom-button
                  *ngFor="let action of getActionButtons(column)"
                  class="gom-table-actions__button"
                  [variant]="action.variant || 'secondary'"
                  [disabled]="action.disabled ? action.disabled(row) : false"
                  (buttonClick)="triggerRowAction(action.actionKey, row)"
                >
                  <i *ngIf="action.actionKey === 'edit'" class="ri-pencil-line" aria-hidden="true"></i>
                  <i *ngIf="action.actionKey === 'delete'" class="ri-delete-bin-line" aria-hidden="true"></i>
                  <i *ngIf="action.actionKey === 'view'" class="ri-eye-line" aria-hidden="true"></i>
                  {{ action.label }}
                </gom-button>
              </div>
            </ng-container>
            <ng-template #standardCell>
              {{ getCellValue(row, column) }}
            </ng-template>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <footer class="gom-table-footer">
    <div class="gom-table-footer__left">
      <label>
        Page Size
        <select #pageSizeSelect [value]="pageSize" (change)="changePageSize(+pageSizeSelect.value)">
          <option *ngFor="let option of pageSizeOptions" [value]="option">{{ option }}</option>
        </select>
      </label>
    </div>

    <div class="gom-table-footer__right">
      <gom-button
        class="gom-table-pager-button"
        variant="secondary"
        size="icon"
        (buttonClick)="previousPage()"
        [disabled]="!canGoPrevious"
        aria-label="Previous page"
        title="Previous page"
      >
        <i class="ri-arrow-left-s-line" aria-hidden="true"></i>
      </gom-button>
      <span>Page {{ pageIndex + 1 }} / {{ totalPages }}</span>
      <gom-button
        class="gom-table-pager-button"
        variant="secondary"
        size="icon"
        (buttonClick)="nextPage()"
        [disabled]="!canGoNext"
        aria-label="Next page"
        title="Next page"
      >
        <i class="ri-arrow-right-s-line" aria-hidden="true"></i>
      </gom-button>
    </div>
  </footer>
</section>

<section class="gom-card-list" *ngIf="mobileCardView">
  <article class="gom-card" *ngFor="let row of displayedRows; trackBy: trackByRow">
    <div class="gom-card__row" *ngFor="let column of visibleColumns; trackBy: trackByColumn">
      <h5 class="gom-card__label">{{ column.header }}</h5>
      <p [class]="'gom-card__value text-' + getTextMode(column)">{{ getCellValue(row, column) }}</p>
    </div>
  </article>
</section>
