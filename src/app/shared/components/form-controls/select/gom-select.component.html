<label class="gom-control__label" [for]="id" *ngIf="label">{{ label }}</label>

<div class="gom-control__select-wrapper">
  <select
    class="gom-control__field"
    [id]="id"
    [value]="value"
    [disabled]="disabled"
    [attr.aria-invalid]="!!error"
    (change)="handleChange($event)"
    (blur)="handleBlur()"
  >
    <option [value]="''" disabled>{{ placeholder }}</option>
    <option *ngFor="let option of options" [value]="option.value">{{ option.label }}</option>
  </select>
  <div class="gom-control__select-icon">
    <i class="ri-arrow-down-s-line" aria-hidden="true"></i>
  </div>
  <div class="gom-control__icon" *ngIf="error">
    <i class="ri-alert-circle-line" aria-hidden="true"></i>
  </div>
</div>

<p class="gom-control__message gom-control__message--error" *ngIf="error"><i class="ri-error-warning-line"></i> {{ error }}</p>
<p class="gom-control__message" *ngIf="!error && hint"><i class="ri-information-line"></i> {{ hint }}</p>
