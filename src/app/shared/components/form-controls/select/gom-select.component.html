@if (label) {
  <label class="gom-control__label" [for]="id">
    {{ label }}
    @if (required) {
      <span class="gom-control__required" aria-hidden="true">*</span>
    }
  </label>
}

<div class="gom-control__select-wrapper" [class.gom-control__select-wrapper--open]="menuOpen">
  <button
    type="button"
    class="gom-control__field gom-control__field--trigger"
    [id]="id"
    [disabled]="disabled || isDisabled"
    [class.gom-control__field--open]="menuOpen"
    [attr.aria-invalid]="!!error"
    (click)="toggleMenu()"
  >
    <span class="gom-control__trigger-text">{{ displayLabel }}</span>
    <span class="gom-control__select-icon">
      <i class="ri-arrow-down-s-line" aria-hidden="true"></i>
    </span>
  </button>

  @if (menuOpen) {
    <div class="gom-control__menu" [class.gom-control__menu--upward]="menuOpenUpward" [ngStyle]="menuStyles">
      @if (searchable) {
        <div class="gom-control__menu-search" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">
          <input
            type="search"
            class="gom-control__menu-search-input"
            [placeholder]="searchPlaceholder"
            [value]="searchTerm"
            (input)="onSearchInput($event)"
          />
        </div>
      }

      @if (!filteredOptions.length) {
        <div class="gom-control__menu-empty">No options found</div>
      }

      @for (option of filteredOptions; track option.value) {
        <button
          type="button"
          class="gom-control__menu-item"
          [class.gom-control__menu-item--selected]="isSelected(option.value)"
          (click)="selectOption(option.value)"
        >
          @if (multiple) {
            <input type="checkbox" [checked]="isSelected(option.value)" tabindex="-1" />
          }
          <span>{{ option.label }}</span>
        </button>
      }
    </div>
  }

  @if (error) {
    <div class="gom-control__icon">
      <i class="ri-alert-circle-line" aria-hidden="true"></i>
    </div>
  }
</div>

@if (error) {
  <p class="gom-control__message gom-control__message--error"><i class="ri-error-warning-line"></i> {{ error }}</p>
} @else if (hint) {
  <p class="gom-control__message"><i class="ri-information-line"></i> {{ hint }}</p>
}
