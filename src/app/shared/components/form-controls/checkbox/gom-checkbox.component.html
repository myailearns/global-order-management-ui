<div class="gom-checkbox-wrapper">
  <input
    class="gom-checkbox"
    [id]="id"
    type="checkbox"
    [checked]="checked"
    [disabled]="disabled"
    [attr.aria-invalid]="!!error"
    (change)="handleChange($event)"
    (blur)="handleBlur()"
  />
  <label class="gom-checkbox__label" [for]="id">{{ label }}</label>
</div>

@if (error) {
  <p class="gom-control__message gom-control__message--error">{{ error }}</p>
} @else if (hint) {
  <p class="gom-control__message">{{ hint }}</p>
}
