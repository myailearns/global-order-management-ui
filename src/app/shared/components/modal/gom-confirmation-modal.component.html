<gom-lib-modal
  class="gom-confirmation-modal"
  [(show)]="show"
  [title]="title()"
  [size]="'small'"
  [closeOnBackdropClick]="true"
  (closed)="onCancel()"
>
  <div class="gom-confirmation-modal__message">
    {{ message() }}
  </div>

  <footer class="gom-confirmation-modal__actions gom-modal__action-layout" gom-modal-actions>
    <div class="gom-modal__action-layout-start">
      <gom-lib-button
        type="button"
        variant="secondary"
        [size]="cancelMode === 'icon-only' ? 'icon' : 'default'"
        (buttonClick)="onCancel()"
        [disabled]="busy()"
        [attr.aria-label]="cancelText()"
        [attr.title]="cancelText()"
      >
        @if (shouldShowIcon(cancelMode)) {
          <i [class]="cancelIcon()" aria-hidden="true"></i>
        }
        @if (shouldShowText(cancelMode)) {
          {{ cancelText() }}
        }
      </gom-lib-button>
    </div>

    <div class="gom-modal__action-layout-end">
      <gom-lib-button
        type="button"
        [size]="confirmMode === 'icon-only' ? 'icon' : 'default'"
        [variant]="confirmVariant()"
        (buttonClick)="onConfirm()"
        [disabled]="busy()"
        [attr.aria-label]="confirmText()"
        [attr.title]="confirmText()"
      >
        @if (shouldShowIcon(confirmMode)) {
          <i [class]="confirmIcon()" aria-hidden="true"></i>
        }
        @if (shouldShowText(confirmMode)) {
          {{ confirmText() }}
        }
      </gom-lib-button>
    </div>
  </footer>
</gom-lib-modal>
